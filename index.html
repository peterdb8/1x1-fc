<!-- Data & engine -->
<script src="data/teams.js"></script>
<script src="data/badges.js"></script>
<script src="data/squad.js?v=3"></script>
<script src="data/squad_liverpool.js"></script>
<script src="data/squad_realmadrid.js"></script>
<script src="data/season.js"></script>
<script src="data/league_teams.js"></script>

<script src="data/seasons/bayern_bundesliga.js"></script>
<script src="data/seasons/bayern_dfbpokal.js"></script>
<script src="data/seasons/bayern_cl.js"></script>
<!-- Liverpool seasons -->
<script src="data/seasons/liverpool_premierleague.js"></script>
<script src="data/seasons/liverpool_facup.js"></script>
<script src="data/seasons/liverpool_cl.js"></script>
<!-- Real Madrid seasons -->
<script src="data/seasons/realmadrid_laliga.js"></script>
<script src="data/seasons/realmadrid_copadelrey.js"></script>
<script src="data/seasons/realmadrid_cl.js"></script>
<script src="engine/math.js"></script>
<script src="engine/season.js"></script>

<script src="engine/cpu_ai.js"></script>

<body>
<div id="root"></div>

<!-- UI components -->
<script type="text/babel" src="ui/common.jsx"></script>
<script type="text/babel" src="ui/team_select.jsx"></script>
<script type="text/babel" src="ui/competition_select.jsx"></script>
<script type="text/babel" src="ui/menu.jsx"></script>
<script type="text/babel" src="ui/lineup.jsx"></script>
<script type="text/babel" src="ui/duel.jsx"></script>
<script type="text/babel" src="ui/controls.jsx"></script>
<script type="text/babel" src="ui/gameplay.jsx"></script>
<script type="text/babel" src="ui/learn.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#0066CC",
  "numpadVisible": true,
  "showDebugProfile": false,
  "multiplicationRange": 10
}/*EDITMODE-END*/;

const { useState, useEffect, useRef } = React;

// Hilfsfunktion um den Kader für ein Team zu bekommen
function getSquadForTeam(teamId) {
  switch(teamId) {
    case 'bayern': return window.BAYERN_SQUAD;
    case 'liverpool': return window.LIVERPOOL_SQUAD;
    case 'realmadrid': return window.REALMADRID_SQUAD;
    default: return window.BAYERN_SQUAD;
  }
}

// Hilfsfunktion um die Saison-Daten für Team+Wettbewerb zu bekommen
function getSeasonData(teamId, competitionId) {
  const key = `${teamId}_${competitionId}`;
  switch(key) {
    // Bayern
    case 'bayern_cl': return { matches: window.BAYERN_CL, difficulty: window.BAYERN_CL_DIFFICULTY };
    case 'bayern_bundesliga': return { matches: window.BAYERN_BUNDESLIGA, difficulty: window.BUNDESLIGA_DIFFICULTY };
    case 'bayern_dfbpokal': return { matches: window.BAYERN_DFBPOKAL, difficulty: window.DFBPOKAL_DIFFICULTY };
    // Liverpool
    case 'liverpool_cl': return { matches: window.LIVERPOOL_CL, difficulty: window.LIVERPOOL_CL_DIFFICULTY };
    case 'liverpool_premierleague': return { matches: window.LIVERPOOL_PREMIERLEAGUE, difficulty: window.PREMIERLEAGUE_DIFFICULTY };
    case 'liverpool_facup': return { matches: window.LIVERPOOL_FACUP, difficulty: window.FACUP_DIFFICULTY };
    // Real Madrid
    case 'realmadrid_cl': return { matches: window.REALMADRID_CL, difficulty: window.REALMADRID_CL_DIFFICULTY };
    case 'realmadrid_laliga': return { matches: window.REALMADRID_LALIGA, difficulty: window.LALIGA_DIFFICULTY };
    case 'realmadrid_copadelrey': return { matches: window.REALMADRID_COPADELREY, difficulty: window.COPADELREY_DIFFICULTY };
    // Fallback
    default: return { matches: window.CL_SEASON, difficulty: window.CL_DIFFICULTY };
  }
}

function App() {
  // Screens: teamSelect | competitionSelect | menu | lineup | match | learn
  const [screen, setScreen] = useState("teamSelect");
  const [selectedTeam, setSelectedTeam] = useState(null);
  const [selectedCompetition, setSelectedCompetition] = useState(null);
  const [seasonState, setSeasonState] = useState(() => window.SeasonStore.load());
  const [matchIdx, setMatchIdx] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaksAvail, setTweaksAvail] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAKS);

  // Prüfe ob bereits eine laufende Saison existiert
  useEffect(() => {
    const saved = window.SeasonStore.load();
    if (saved.teamId && saved.competitionId && saved.results.length > 0) {
      setSelectedTeam(saved.teamId);
      setSelectedCompetition(saved.competitionId);
      setSeasonState(saved);
      setScreen("menu");
    }
  }, []);

  useEffect(() => {
    const listener = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", listener);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    setTweaksAvail(true);
    return () => window.removeEventListener("message", listener);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const onSelectTeam = (teamId) => {
    setSelectedTeam(teamId);
    setScreen("competitionSelect");
  };

  const onSelectCompetition = (competitionId) => {
    setSelectedCompetition(competitionId);
    // Neue Saison starten
    const newSeason = {
      teamId: selectedTeam,
      competitionId: competitionId,
      results: [],
      currentMatchIdx: 0,
      lineup: [],
      difficulty: "medium",
    };
    setSeasonState(newSeason);
    window.SeasonStore.save(newSeason);
    setScreen("menu");
  };

  const startMatch = (idx) => {
    setMatchIdx(idx);
    setScreen("lineup");
  };

  const onConfirmLineup = (lineup) => {
    const next = { ...seasonState, lineup };
    setSeasonState(next);
    window.SeasonStore.save(next);
    setScreen("match");
  };

  const onMatchEnd = ({ myScore, oppScore }) => {
    const outcome = myScore > oppScore ? "W" : myScore === oppScore ? "D" : "L";
    const results = [...seasonState.results.filter(r => r.idx !== matchIdx), { idx: matchIdx, myScore, oppScore, outcome }];
    const next = {
      ...seasonState,
      results,
      currentMatchIdx: matchIdx + 1,
    };
    setSeasonState(next);
    window.SeasonStore.save(next);
    setScreen("menu");
  };

  const setDifficulty = (d) => {
    const next = { ...seasonState, difficulty: d };
    setSeasonState(next);
    window.SeasonStore.save(next);
  };

  const resetSeason = () => {
    if (!confirm("Saison zurücksetzen und neues Team wählen?")) return;
    window.SeasonStore.reset();
    setSeasonState(window.SeasonStore.load());
    setSelectedTeam(null);
    setSelectedCompetition(null);
    setScreen("teamSelect");
  };

  const resetSeasonAndProfile = () => {
    if (!confirm("Saison UND Lernprofil zurücksetzen?")) return;
    window.SeasonStore.reset();
    window.MathEngine.reset();
    setSeasonState(window.SeasonStore.load());
    setSelectedTeam(null);
    setSelectedCompetition(null);
    setScreen("teamSelect");
  };

  // Aktuelle Daten basierend auf Auswahl
  const squad = selectedTeam ? getSquadForTeam(selectedTeam) : [];
  const seasonData = (selectedTeam && selectedCompetition) ? getSeasonData(selectedTeam, selectedCompetition) : { matches: [], difficulty: {} };
  const match = matchIdx != null ? seasonData.matches[matchIdx] : null;
  const team = selectedTeam ? window.TEAMS[selectedTeam] : null;
  const competition = selectedCompetition ? window.COMPETITIONS[selectedCompetition] : null;

  return (
    <div>
      {screen === "teamSelect" && (
        <window.TeamSelect onSelectTeam={onSelectTeam} />
      )}
      {screen === "competitionSelect" && selectedTeam && (
        <window.CompetitionSelect
          teamId={selectedTeam}
          onSelectCompetition={onSelectCompetition}
          onBack={() => setScreen("teamSelect")}
        />
      )}
      {screen === "menu" && (
        <window.MainMenu
          onStartMatch={startMatch}
          seasonState={seasonState}
          seasonData={seasonData}
          team={team}
          competition={competition}
          onReset={resetSeason}
          onResetAll={resetSeasonAndProfile}
          difficulty={seasonState.difficulty}
          setDifficulty={setDifficulty}
          onOpenLearn={() => setScreen("learn")}
          onNewSeason={() => {
            if (confirm("Neue Saison starten? Fortschritt geht verloren.")) {
              window.SeasonStore.reset();
              setSeasonState(window.SeasonStore.load());
              setSelectedTeam(null);
              setSelectedCompetition(null);
              setScreen("teamSelect");
            }
          }}
        />
      )}
      {screen === "learn" && (
        <window.LearnProgress onBack={() => setScreen("menu")} />
      )}
      {screen === "lineup" && match && (
        <window.Lineup
          squad={squad}
          initial={seasonState.lineup}
          match={match}
          team={team}
          teamId={selectedTeam}
          onConfirm={onConfirmLineup}
          onBack={() => setScreen("menu")}
        />
      )}
      {screen === "match" && match && (
        <window.Gameplay
          match={match}
          lineup={seasonState.lineup}
          squad={squad}
          team={team}
          difficulty={seasonState.difficulty}
          difficultyConfig={seasonData.difficulty}
          onEnd={onMatchEnd}
          onBackToMenu={() => setScreen("menu")}
        />
      )}

      {tweaksOpen && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => setTweaksOpen(false)} />
      )}
    </div>
  );
}

function TweaksPanel({ tweaks, setTweak, onClose }) {
  const profile = window.MathEngine.loadProfile();
  const rowStats = window.MathEngine.rowStats(profile);

  return (
    <div style={{
      position: "fixed", right: 20, bottom: 20,
      width: 340, background: "white",
      borderRadius: 14, boxShadow: "0 20px 50px rgba(0,0,0,0.3)",
      border: "2px solid #0A1E3F",
      zIndex: 9999, overflow: "hidden",
      maxHeight: "80vh", display: "flex", flexDirection: "column",
    }}>
      <div style={{ background: "#0A1E3F", color: "white", padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontFamily: "'Archivo Black',sans-serif", fontSize: 14, letterSpacing: 1 }}>TWEAKS</div>
        <button onClick={onClose} style={{ background: "transparent", border: 0, color: "white", fontSize: 18, cursor: "pointer" }}>×</button>
      </div>
      <div style={{ padding: 16, overflowY: "auto" }}>
        <TweakRow label="Akzentfarbe">
          <div style={{ display: "flex", gap: 6 }}>
            {["#DC0817", "#FFB800", "#2D7A3E", "#0066CC", "#9B59B6"].map(c => (
              <button key={c} onClick={() => setTweak("accent", c)} style={{
                width: 28, height: 28, borderRadius: "50%", background: c,
                border: tweaks.accent === c ? "3px solid #0A1E3F" : "3px solid #EDEFF5",
                cursor: "pointer",
              }} />
            ))}
          </div>
        </TweakRow>
        <TweakRow label="Numpad sichtbar">
          <input type="checkbox" checked={tweaks.numpadVisible} onChange={e => setTweak("numpadVisible", e.target.checked)} />
        </TweakRow>
        <TweakRow label="Zahlenbereich bis">
          <select value={tweaks.multiplicationRange} onChange={e => setTweak("multiplicationRange", parseInt(e.target.value, 10))} style={{ padding: "4px 8px", borderRadius: 6 }}>
            {[5, 7, 10].map(r => <option key={r} value={r}>bis {r}</option>)}
          </select>
        </TweakRow>

        <div style={{ marginTop: 18, fontFamily: "'Archivo Black',sans-serif", fontSize: 11, letterSpacing: 1.5, color: "#DC0817" }}>LERNPROFIL — NACH REIHEN</div>
        <div style={{ marginTop: 8, display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6 }}>
          {rowStats.map(r => {
            const pct = r.accuracy === null ? null : Math.round(r.accuracy * 100);
            const bg = pct === null ? "#F4F5F8" : pct >= 90 ? "#E8F5EC" : pct >= 70 ? "#FFF3D6" : "#FDEDED";
            const fg = pct === null ? "#999" : pct >= 90 ? "#2D7A3E" : pct >= 70 ? "#B88500" : "#DC0817";
            return (
              <div key={r.row} style={{ background: bg, borderRadius: 8, padding: "8px 4px", textAlign: "center" }}>
                <div style={{ fontFamily: "'Archivo Black',sans-serif", fontSize: 16, color: "#0A1E3F" }}>{r.row}er</div>
                <div style={{ fontFamily: "'Archivo Black',sans-serif", fontSize: 11, color: fg }}>
                  {pct === null ? "—" : `${pct}%`}
                </div>
                <div style={{ fontFamily: "Inter", fontSize: 9, color: "#666" }}>{r.attempts}×</div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 12, fontFamily: "Inter", fontSize: 11, color: "#666", lineHeight: 1.4 }}>
          Grün ≥90% · Gelb ≥70% · Rot unter 70%. Das Spiel wählt bevorzugt schwächere Aufgaben.
        </div>
      </div>
    </div>
  );
}

const TweakRow = ({ label, children }) => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, fontFamily: "Inter", fontSize: 13 }}>
    <span style={{ color: "#0A1E3F" }}>{label}</span>
    <span>{children}</span>
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- Service Worker für Offline-Support -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
